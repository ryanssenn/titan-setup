# Infrastructure validation run: 4x H100, FSDP2, standard stack
# Uses debugmodel (no gated HF assets required).

[job]
dump_folder = "outputs/infrastructure-run"
description = "debug-model infrastructure validation (FSDP + selective AC, c4_test)"

[profiling]
enable_profiling = false

[metrics]
log_freq = 10
enable_tensorboard = true
save_tb_folder = "tb"

[model]
name = "llama3"
flavor = "debugmodel"
tokenizer_path = "./tests/assets/test_tiktoken.model"

[optimizer]
name = "AdamW"
lr = 8e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 50
decay_ratio = 0.2
decay_type = "linear"
lr_min = 0.0

[training]
local_batch_size = 8
seq_len = 2048
max_norm = 1.0
steps = 500
compile = false
dataset = "c4_test"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable_checkpoint = true
folder = "checkpoint"
interval = 250
last_save_model_weights_only = false
export_dtype = "float32"
async_mode = "disabled"

[activation_checkpoint]
mode = "selective"
selective_ac_option = "2"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]