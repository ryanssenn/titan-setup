# Llama 3.1 8B infrastructure run (requires gated HF tokenizer).
# Download first:
#   python scripts/download_tokenizer.py \
#     --repo_id meta-llama/Meta-Llama-3.1-8B \
#     --hf_token $HF_TOKEN \
#     --local_dir assets/tokenizer

[job]
dump_folder = "/workspace/titan-exp/outputs/llama3-8b-run"
description = "titan-exp Llama 3.1 8B infrastructure validation (2 GPU, 500 steps)"

[profiling]
enable_profiling = false

[metrics]
log_freq = 10
enable_tensorboard = true
save_tb_folder = "tb"

[model]
name = "llama3"
flavor = "8B"
tokenizer_path = "./assets/tokenizer/original/tokenizer.model"

[optimizer]
name = "AdamW"
lr = 3e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 50

[training]
local_batch_size = 1
seq_len = 8192
max_norm = 1.0
steps = 500
compile = false
dataset = "c4"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = -1
tensor_parallel_degree = 1
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable_checkpoint = true
folder = "checkpoint"
interval = 250
last_save_model_weights_only = false
export_dtype = "float32"
async_mode = "disabled"

[activation_checkpoint]
mode = "selective"
selective_ac_option = "op"

[float8]
enable_fsdp_float8_all_gather = false
precompute_float8_dynamic_scale_for_fsdp = false
filter_fqns = ["output"]